name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-utahon
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 8m
          script: |
            cd /opt/utahon
            echo "[deploy] pull latest"
            git pull --ff-only
            echo "[deploy] npm ci"
            npm ci --no-audit --no-fund
            echo "[deploy] build"
            npm run build
            echo "[deploy] restart service"
            systemctl restart utahon
            sleep 2
            systemctl is-active utahon
            echo "[deploy] done"
